<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Store</title>

    <!-- Подключение шрифта Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="container header-container">
            <!-- Логотип -->
            <a href="index.html" class="logo">
                <img src="images/Logo.jpg" alt="Furniture Store Logo">
            </a>

            <!-- Меню справа -->
            <nav class="main-menu">
                <ul>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="#cart">Корзина</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Герой-секция -->
    <section class="hero">
        <div class="container hero-container">
            <p class="hero-subtitle">Интерьер.</p>
            <h1 class="hero-title">Всё, что заслуживает ваш дом</h1>
            <p class="hero-description">Наша мебель — ваше отражение</p>
            <a href="catalog.html" class="hero-button">Перейти в каталог</a>
        </div>
    </section>

    <!-- Подвал -->
    <footer>
        <div class="container">
            <p>Сайт был сверстан Казаковым Иваном</p>
        </div>
    </footer>
</body>
</html>
